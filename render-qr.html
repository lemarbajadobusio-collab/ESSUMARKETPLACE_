<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESSU Marketplace QR</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      background: linear-gradient(180deg, #1fb04d 0%, #149140 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: 20px;
      color: white;
    }
    .auth {
      width: min(480px, 100%);
      display: grid;
      gap: 16px;
    }
    .auth-header {
      text-align: center;
    }
    .auth-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .auth-logo-image {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      background: transparent;
    }
    .auth-header h1 {
      margin: 0 0 4px;
      font-size: 26px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: white;
    }
    .auth-header p {
      margin: 0;
      color: rgba(255,255,255,0.85);
    }
    .auth-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
      display: grid;
      gap: 16px;
      color: #1e293b;
      text-align: center;
    }
    .qr {
      background: #ffffff;
      padding: 12px 12px;
      padding-top: 30px;
      padding-bottom: 30px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      display: grid;
      place-items: center;
    }
    .qr img {
      width: min(240px, 70vw);
      height: auto;
    }
    .link {
      font-size: 13px;
      word-break: break-all;
      color: #0f172a;
    }
    .note {
      font-size: 12px;
      color: #64748b;
    }
    @media (max-width: 480px) {
      body {
        padding: 20px 14px;
      }
      .auth-logo-image {
        width: 68px;
        height: 68px;
      }
      .auth-header h1 {
        font-size: 19px;
      }
      .auth-card {
        padding: 18px;
      }
      .link {
        font-size: 12px;
      }
      .note {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <section class="auth">
    <div class="auth-header">
      <div class="auth-logo">
        <img src="logo.png" alt="ESSU Marketplace logo" class="auth-logo-image" />
        <h1>ESSU Marketplace</h1>
      </div>
      <p>Buy, Sell, Succeed Together.</p>
    </div>

    <div class="auth-card">
      <div class="qr">
        <img id="qrImage" alt="QR code for ESSU Marketplace" width="240" height="240" />
    
  </section>

  <script>
    const targetUrl = "https://essumarketplace-1.onrender.com";
    const qrApi = "https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=" + encodeURIComponent(targetUrl);
    const img = document.getElementById("qrImage");
    const link = document.getElementById("qrLink");
    img.src = qrApi;
    link.textContent = targetUrl;
  </script>
</body>
</html>
